<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>レシピ → Discord (Gemini版)</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  background: #f5f5f3;
  color: #1a1a18;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 3rem;
}
.header {
  width: 100%;
  max-width: 480px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.25rem 1.25rem 0;
  margin-bottom: 1.5rem;
}
.header h1 { font-size: 17px; font-weight: 600; }
.gear-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  color: #888;
  font-size: 20px;
  line-height: 1;
}
.gear-btn:hover { background: #e8e8e6; }
.screen { width: 100%; max-width: 480px; padding: 0 1.25rem; display: none; }
.screen.active { display: block; }
.card {
  background: #fff;
  border-radius: 16px;
  padding: 1.25rem;
  border: 0.5px solid #ddd;
}
label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #888;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 6px;
  margin-top: 1rem;
}
label:first-of-type { margin-top: 0; }
input {
  width: 100%;
  padding: 11px 13px;
  border: 1px solid #e0e0dc;
  border-radius: 10px;
  font-size: 15px;
  background: #fafaf8;
  outline: none;
  -webkit-appearance: none;
}
input:focus { border-color: #aaa; background: #fff; }
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 1.25rem;
  -webkit-appearance: none;
}
.btn-primary { background: #1a1a18; color: #fff; }
.btn-primary:active { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-secondary { background: #eeeee8; color: #1a1a18; }
.btn-secondary:active { opacity: 0.75; }
.status {
  font-size: 14px;
  margin-top: 1rem;
  padding: 13px 15px;
  border-radius: 12px;
  display: none;
  line-height: 1.5;
}
.status.info { background: #e6f1fb; color: #185fa5; display: block; }
.status.success { background: #eaf3de; color: #3b6d11; display: block; }
.status.error { background: #fcebeb; color: #a32d2d; display: block; }
.result-box {
  margin-top: 1rem;
  padding: 1rem 1.1rem;
  background: #f5f5f3;
  border-radius: 12px;
  font-size: 13px;
  white-space: pre-wrap;
  line-height: 1.75;
  display: none;
  color: #333;
  word-break: break-word;
}
.steps {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 1.25rem;
  font-size: 12px;
  color: #aaa;
}
.step-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #eeeee8;
  font-size: 11px;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  color: #aaa;
}
.step-dot.active { background: #1a1a18; color: #fff; }
.step-dot.done { background: #eaf3de; color: #3b6d11; }
.step-sep { font-size: 10px; }
.settings-saved {
  font-size: 13px;
  color: #3b6d11;
  background: #eaf3de;
  padding: 10px 13px;
  border-radius: 10px;
  margin-top: 1rem;
  display: none;
  text-align: center;
}
.version {
  position: fixed;
  bottom: 8px;
  right: 12px;
  font-size: 10px;
  color: #ccc;
}
</style>
</head>
<body>

<div class="header">
  <h1 id="page-title">レシピ → Discord (Gemini版)</h1>
  <button class="gear-btn" onclick="toggleSettings()">⚙</button>
</div>

<!-- メイン画面 -->
<div class="screen active" id="main-screen">
  <div class="steps">
    <div class="step-dot active" id="dot1">1</div><span>URL入力</span>
    <span class="step-sep">›</span>
    <div class="step-dot" id="dot2">2</div><span>解析</span>
    <span class="step-sep">›</span>
    <div class="step-dot" id="dot3">3</div><span>送信</span>
  </div>
  <div class="card">
    <label for="recipe-url">レシピURL</label>
    <input type="url" id="recipe-url" placeholder="https://www.kurashiru.com/recipes/..." autocomplete="off" />
    <button class="btn btn-primary" id="run-btn" onclick="runPipeline()">解析して送信する</button>
  </div>
  <div class="status" id="status-msg"></div>
  <div class="result-box" id="result-box"></div>
</div>

<!-- 設定画面 -->
<div class="screen" id="settings-screen">
  <div class="card">
    <label for="s-api-key">Gemini APIキー</label>
    <input type="password" id="s-api-key" placeholder="AIzaSy..." autocomplete="off" />
    <label for="s-webhook">Discord Webhook URL</label>
    <input type="url" id="s-webhook" placeholder="https://discord.com/api/webhooks/..." autocomplete="off" />
    <button class="btn btn-primary" onclick="saveSettings()">保存する</button>
    <button class="btn btn-secondary" onclick="showMain()">キャンセル</button>
  </div>
  <div class="settings-saved" id="settings-saved">✓ 保存しました</div>
</div>

<div class="version">v2.0 (2.5-flash)</div>

<script>
const KEY_API = 'rdc_gemini_api_key';
const KEY_WH  = 'rdc_webhook';

function init() {
  if (!localStorage.getItem(KEY_API) || !localStorage.getItem(KEY_WH)) {
    showSettings();
  } else {
    showMain();
  }
}

function showMain() {
  document.getElementById('main-screen').classList.add('active');
  document.getElementById('settings-screen').classList.remove('active');
  document.getElementById('page-title').textContent = 'レシピ → Discord';
}

function showSettings() {
  document.getElementById('settings-screen').classList.add('active');
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('page-title').textContent = '設定';
  document.getElementById('settings-saved').style.display = 'none';
  const api = localStorage.getItem(KEY_API);
  const wh  = localStorage.getItem(KEY_WH);
  if (api) document.getElementById('s-api-key').value = api;
  if (wh)  document.getElementById('s-webhook').value = wh;
}

function toggleSettings() {
  const isSettings = document.getElementById('settings-screen').classList.contains('active');
  if (isSettings) showMain(); else showSettings();
}

function saveSettings() {
  const api = document.getElementById('s-api-key').value.trim();
  const wh  = document.getElementById('s-webhook').value.trim();
  if (!api || !wh) { alert('両方入力してください。'); return; }
  localStorage.setItem(KEY_API, api);
  localStorage.setItem(KEY_WH, wh);
  document.getElementById('settings-saved').style.display = 'block';
  setTimeout(() => showMain(), 900);
}

async function runPipeline() {
  const recipeUrl = document.getElementById('recipe-url').value.trim();
  const apiKey    = localStorage.getItem(KEY_API);
  const webhook   = localStorage.getItem(KEY_WH);
  const btn       = document.getElementById('run-btn');
  const resultBox = document.getElementById('result-box');

  if (!recipeUrl) { showStatus('error', 'URLを入力してください。'); return; }
  if (!apiKey || !webhook) { showStatus('error', '設定が未完了です。右上の ⚙ から設定してください。'); return; }

  btn.disabled = true;
  resultBox.style.display = 'none';
  setDot(1, 'active'); setDot(2, ''); setDot(3, '');
  showStatus('info', '① レシピを解析しています...');
  setDot(1, 'done'); setDot(2, 'active');

  let result;
  try {
    result = await fetchAndFormat(recipeUrl, apiKey);
  } catch (e) {
    showStatus('error', '解析に失敗しました: ' + e.message);
    btn.disabled = false;
    return;
  }

  resultBox.textContent = result.text;
  resultBox.style.display = 'block';
  showStatus('info', '② Discordに送信しています...');
  setDot(2, 'done'); setDot(3, 'active');

  try {
    await sendToDiscord(webhook, result);
  } catch (e) {
    showStatus('error', 'Discord送信に失敗しました: ' + e.message);
    btn.disabled = false;
    return;
  }

  setDot(3, 'done');
  showStatus('success', '✓ Discordへの送信が完了しました！');
  document.getElementById('recipe-url').value = '';
  btn.disabled = false;
}

async function fetchAndFormat(url, apiKey) {
  const prompt = `以下のレシピURLのページから情報を取得して、指定されたフォーマットで整形してください。
URLにアクセスしてページの内容を取得し、レシピ情報を解析してください。

対象URL: ${url}

以下の形式のJSONのみを返してください（説明文は不要）:
{
  "thumbnail": "ページのog:imageまたはメイン画像のURL（取得できない場合はnull）",
  "text": "以下のフォーマットで整形したレシピテキスト"
}

textのフォーマット（必ず1人前の分量に換算してください）:
【名前】
（レシピの料理名）

【必要なもの（一人前）】

＜食材＞
・食材名 分量
・食材名 分量
（以下必要な分だけ）

＜調味料＞
・調味料名 分量
・調味料名 分量
（以下必要な分だけ）

【調理過程】
1. （手順を簡潔に）
2. （手順を簡潔に）
（以下必要な分だけ）

参考URL: ${url}`;

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      contents: [{
        parts: [{
          text: prompt
        }]
      }],
      generationConfig: {
        temperature: 0.3,
        maxOutputTokens: 2048,
        responseMimeType: "application/json"
      },
      tools: [{
        googleSearch: {}
      }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();

  // Geminiのレスポンスから結果を取得
  let resultText = '';
  if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
    for (const part of data.candidates[0].content.parts) {
      if (part.text) {
        resultText += part.text;
      }
    }
  }

  if (!resultText) throw new Error('解析結果が空でした。');

  try {
    // JSONをパース
    const parsed = JSON.parse(resultText.replace(/```json|```/g, '').trim());
    return parsed;
  } catch (e) {
    // JSONパースに失敗した場合は、テキストのみを返す
    return { text: resultText.trim(), thumbnail: null };
  }
}

async function sendToDiscord(webhookUrl, result) {
  const chunks = splitMessage(result.text, 2000);

  for (let i = 0; i < chunks.length; i++) {
    const payload = { content: chunks[i] };

    // 最初のメッセージにサムネイル画像を添付
    if (i === 0 && result.thumbnail) {
      payload.embeds = [{
        image: {
          url: result.thumbnail
        }
      }];
    }

    const res = await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error(`Webhook ${res.status}`);

    // レート制限を考慮して少し待機
    if (i < chunks.length - 1) {
      await new Promise(resolve => setTimeout(resolve, 500));
    }
  }
}

function splitMessage(text, limit) {
  if (text.length <= limit) return [text];
  const chunks = [];
  let i = 0;
  while (i < text.length) {
    chunks.push(text.slice(i, i + limit));
    i += limit;
  }
  return chunks;
}

function showStatus(type, msg) {
  const el = document.getElementById('status-msg');
  el.className = 'status ' + type;
  el.textContent = msg;
}

function setDot(n, state) {
  const el = document.getElementById('dot' + n);
  el.className = 'step-dot' + (state ? ' ' + state : '');
}

init();
</script>
</body>
</html>
